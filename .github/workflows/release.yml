# Publishes to PyPI on version tags (e.g. v1.0.12). Uses PyPI Trusted Publishing (OIDC).
# Configure a pending trusted publisher on PyPI for workflow file: release.yml
# Use a GitHub Environment named "pypi" with required reviewers so only you approve uploads.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/approck-healthcheck/
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test (wheel)
        run: |
          uv run --isolated --no-project --with "$(ls dist/*.whl)" \
            python -c "from healthcheck import VERSION; from healthcheck.application import create_application; assert VERSION and create_application"

      - name: Smoke test (sdist)
        run: |
          uv run --isolated --no-project --with "$(ls dist/*.tar.gz)" \
            python -c "from healthcheck import VERSION; from healthcheck.application import create_application; assert VERSION and create_application"

      - name: Publish to PyPI
        run: uv publish
